<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlgoViz - Гонка алгоритмов</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="max-width: 1200px;"> <nav class="top-nav">
            <a href="index.html" class="nav-link">🎓 Режим обучения</a>
            <a href="race.html" class="nav-link active">🏎️ Режим гонки</a>
        </nav>

        <div class="header-info">
            <h1>Гонка алгоритмов</h1>
            <p class="description">Узнайте на практике, почему O(n log n) быстрее, чем O(n²). Оба алгоритма получат абсолютно одинаковый массив данных.</p>
        </div>

        <div class="dashboard-panel" style="margin-top: 20px;">
            <div class="controls-grid" style="grid-template-columns: 1fr 1fr;">
                <div class="control-group">
                    <label for="sizeSlider">Размер массива: <span id="sizeValue">30</span></label>
                    <input type="range" id="sizeSlider" min="10" max="100" value="30" class="modern-slider">
                </div>
                <div class="control-group">
                    <label for="speedSlider">Скорость анимации: <span id="speedValue">50</span> мс</label>
                    <input type="range" id="speedSlider" min="10" max="500" value="50" step="10" class="modern-slider">
                </div>
            </div>
            <div class="action-row">
                <button id="start-race-btn" class="glow-on-hover" style="background-color: #ff4081;">🏁 Начать гонку</button>
            </div>
            <p id="race-status" style="text-align: center; margin-top: 15px; color: #8b929a;">Выберите претендентов и нажмите старт</p>
        </div>

        <div class="race-layout">
            <div class="competitor">
                <select id="algo-left" class="modern-select">
                    <option value="bubble">Сортировка пузырьком</option>
                    <option value="selection">Сортировка выбором</option>
                    <option value="quick">Быстрая сортировка</option>
                    <option value="merge" selected>Сортировка слиянием</option>
                </select>
                <div id="viz-left" class="visualization-container"></div>
                <h3 id="status-left">Ожидание...</h3>
            </div>

            <div class="competitor">
                <select id="algo-right" class="modern-select">
                    <option value="bubble">Сортировка пузырьком</option>
                    <option value="selection">Сортировка выбором</option>
                    <option value="quick" selected>Быстрая сортировка</option>
                    <option value="merge">Сортировка слиянием</option>
                </select>
                <div id="viz-right" class="visualization-container"></div>
                <h3 id="status-right">Ожидание...</h3>
            </div>
        </div>

    </div>

    <script src="race.js"></script>
</body>
</html>
